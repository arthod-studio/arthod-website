<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Work — ARTHOD</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"/>
  <link rel="stylesheet" href="style.css?v=cursor-fast-20260706-1"/>
  <style>
    .work-page { padding-top: var(--nav-h); }
    body.work-detail-booting .work-page {
      opacity: 0;
      visibility: hidden;
    }
    body.work-detail-ready .work-page {
      opacity: 1;
      visibility: visible;
      transition: opacity .18s ease;
    }

    /* ── Hero ── */
    .work-hero {
      position: relative;
      aspect-ratio: 16/9;
      width: calc(100% - 16px);
      height: auto;
      overflow: hidden;
      margin: 8px;
      border-radius: 16px;
    }

    .work-hero-bg {
      position: absolute;
      inset: 0;
    }

    .work-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, rgba(0,0,0,.1) 60%, transparent 100%);
      display: flex;
      align-items: flex-end;
      padding: clamp(24px,4vw,56px);
    }

    .work-hero-title {
      color: var(--ink);
      margin-top: 20px;
    }

    .wht-num {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .2em;
      opacity: .55;
      display: block;
      margin-bottom: 12px;
    }

    .wht-ko {
      font-size: clamp(40px, 8vw, 100px);
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: .9;
      display: block;
    }

    .wht-en {
      font-size: clamp(16px, 2.5vw, 28px);
      font-weight: 400;
      color: var(--ink-3);
      display: block;
      margin-top: 12px;
    }

    /* ── Meta bar ── */
    .work-meta-bar {
      max-width: var(--max);
      margin: 0 auto;
      padding: 52px var(--px);
      display: grid;
      grid-template-columns: auto auto auto minmax(180px, 1fr);
      gap: 0;
      border-bottom: 1px solid var(--border);
      align-items: end;
    }

    .wm-item {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
      padding: 0 52px 0 0;
      border-right: 1px solid var(--border);
      margin-right: 52px;
    }

    .wm-item:last-of-type {
      border-right: none;
      margin-right: 0;
      padding-right: 0;
    }

    .wm-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .wm-val {
      font-size: clamp(24px, 2.4vw, 34px);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }

    .wm-item:last-of-type .wm-val {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* ── Back link ── */
    .back-link {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ink-3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: color .2s, gap .2s;
      text-decoration: none;
      grid-column: 1 / -1;
      margin-bottom: 24px;
    }
    .back-link::before { content: '←'; font-size: 16px; }
    .back-link:hover { color: var(--ink); gap: 12px; }

    @media (max-width: 768px) {
      .work-meta-bar { grid-template-columns: 1fr 1fr; gap: 24px; }
      .wm-item { border-right: none; padding-right: 0; margin-right: 0; }
    }
    @media (max-width: 480px) {
      .work-hero {
        width: calc(100% - 12px);
        margin: 6px;
        border-radius: 12px;
        aspect-ratio: 4/3;
      }
      .work-meta-bar { grid-template-columns: 1fr; }
    }

    /* ── Body ── */
    .work-body {
      max-width: var(--max);
      margin: 0 auto;
      padding: clamp(48px,7vh,96px) var(--px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px,6vw,80px);
      align-items: start;
    }

    .wb-section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 20px;
      height: 18px;
      display: flex;
      align-items: center;
    }

    .wb-desc {
      font-size: clamp(16px, 1.6vw, 20px);
      font-weight: 500;
      line-height: 1.9;
      color: var(--ink-2);
    }

    /* ── Specs ── */
    .work-specs { padding-top: 0; }

    .spec-row {
      display: flex;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      gap: 20px;
      align-items: baseline;
    }

    .spec-row:first-child { border-top: 1px solid var(--border); }

    .spec-key {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-3);
      width: 110px;
      flex-shrink: 0;
    }

    .spec-val {
      font-size: 16px;
      font-weight: 600;
      color: var(--ink-2);
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .work-body { grid-template-columns: 1fr; gap: 48px; }
    }

    /* ── Content blocks ── */
    .work-content {
      padding: 0 0 clamp(60px,10vh,120px);
      display: flex;
      flex-direction: column;
      gap: clamp(40px,7vh,80px);
    }

    .wc-img {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .wc-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .wc-img-wide { aspect-ratio: 21/9; }
    .wc-img-16 { aspect-ratio: 16/9; }
    .wc-img-sq { aspect-ratio: 4/3; }

    .wc-caption {
      font-size: 12px;
      color: var(--ink-4);
      margin-top: 10px;
      letter-spacing: .04em;
      padding: 0 var(--px);
    }

    .wc-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .wc-2col .wc-img {
      border-radius: 0;
      aspect-ratio: 16/9;
    }

    /* ── 갤러리 레이아웃 범트 (편집 모드에서 선택) ── */
    .wc-gallery { display: grid; gap: 6px; }
    .wc-gallery .wc-img { border-radius: 0; background: #f3f3f3; }
    .wc-gallery .wc-img img,
    .wc-gallery .wc-img video.rich-media-el {
      object-fit: cover !important;
      background: #f3f3f3;
    }
    /* grid-3x2: 정사각형 3x2 (기본) */
    .wc-gallery[data-layout="grid-3x2"] { grid-template-columns: repeat(3, 1fr); }
    .wc-gallery[data-layout="grid-3x2"] .wc-img { aspect-ratio: 4/3; }
    /* grid-2x3: 2열 × 3행, 세로로 긴 사진 */
    .wc-gallery[data-layout="grid-2x3"] { grid-template-columns: 1fr 1fr; }
    .wc-gallery[data-layout="grid-2x3"] .wc-img { aspect-ratio: 3/4; }
    /* wide-strip: 가로로 긴 2열, 와이드스크린 */
    .wc-gallery[data-layout="wide-strip"] { grid-template-columns: 1fr 1fr; }
    .wc-gallery[data-layout="wide-strip"] .wc-img { aspect-ratio: 16/9; }
    /* feature-mix: 첫 사진은 크게(2칸 차지), 나머지는 작게 */
    .wc-gallery[data-layout="feature-mix"] { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr; }
    .wc-gallery[data-layout="feature-mix"] .wc-img { aspect-ratio: 1/1; }
    .wc-gallery[data-layout="feature-mix"] .wc-gitem:first-child { grid-column: span 2; grid-row: span 2; }
    .wc-gallery[data-layout="feature-mix"] .wc-gitem:first-child .wc-img { aspect-ratio: 1/1; height: 100%; }

    @media (max-width: 600px) {
      .wc-gallery[data-layout] { grid-template-columns: repeat(2, 1fr) !important; }
      .wc-gallery[data-layout="feature-mix"] .wc-gitem:first-child { grid-column: span 2; grid-row: span 1; }
    }
    @media (max-width: 480px) {
      .wc-2col,
      .wc-gallery[data-layout] { grid-template-columns: 1fr !important; }
      .wc-gallery[data-layout="feature-mix"] .wc-gitem:first-child { grid-column: span 1; }
    }

    .wc-layout-btn {
      display: none;
      align-items: center; gap: 6px;
      margin: 0 auto 14px; padding: 9px 18px;
      font-size: 12px; font-weight: 700; letter-spacing: .04em;
      background: #fff; border: 1px solid var(--border-2); border-radius: 20px;
      cursor: pointer; color: var(--ink-2);
      max-width: var(--max);
    }
    body.editing .wc-layout-btn { display: flex; }
    .wc-layout-btn:hover { border-color: var(--ink); }

    .wc-gallery-add {
      display: none;
      margin: 14px auto 0; padding: 12px 24px;
      font-size: 13px; font-weight: 700; letter-spacing: .04em;
      background: #fff; border: 1px dashed var(--border-2); border-radius: 24px;
      cursor: pointer; color: var(--ink-2); max-width: var(--max);
    }
    body.editing .wc-gallery-add { display: block; }
    .wc-gallery-add:hover { border-color: var(--ink); color: var(--ink); }

    .wc-gitem {
      position: relative;
      opacity: 0;
      transform: translateY(34px);
      transition: opacity .95s cubic-bezier(0,0,.2,1), transform .95s cubic-bezier(0,0,.2,1);
      transition-delay: var(--g-delay, 0s);
    }
    .wc-gitem.v {
      opacity: 1;
      transform: none;
    }
    .wc-gitem-remove {
      display: none;
      position: absolute; top: 8px; right: 8px; z-index: 64;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(200,30,20,.92); color: #fff; border: none;
      font-size: 13px; line-height: 1; cursor: pointer;
      align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.25);
    }
    body.editing .wc-gitem-remove { display: flex; }

    .wc-layout-panel {
      position: fixed; right: 24px; top: 50%; transform: translateY(-50%); z-index: 1002;
      width: 280px; background: #fff; border: 1px solid var(--border);
      border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.28);
      display: none; flex-direction: column; overflow: hidden;
    }
    .wc-layout-panel.open { display: flex; }
    .wlp-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; }
    .wlp-close { border: none; background: none; cursor: pointer; font-size: 14px; color: var(--ink-3); }
    .wlp-list { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .wlp-opt {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px;
      border: 1px solid var(--border); cursor: pointer; background: #fff; text-align: left; font-family: inherit;
    }
    .wlp-opt:hover { border-color: var(--ink-3); }
    .wlp-opt.active { border-color: var(--ink); background: var(--bg-warm, #f7f6f3); }
    .wlp-opt-icon { width: 32px; height: 24px; flex-shrink: 0; display: grid; gap: 2px; }
    .wlp-opt-icon span { background: var(--ink-4); border-radius: 1px; }
    .wlp-opt-label { font-size: 13px; font-weight: 600; color: var(--ink); }

    .wc-text-block {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--px);
    }
    .wc-text-block h3 {
      font-size: clamp(20px, 2.5vw, 32px);
      font-weight: 700;
      letter-spacing: -.03em;
      margin-bottom: 16px;
      color: var(--ink);
    }
    .wc-about-body {
      font-size: 20px;
    }
    .wc-text-block p {
      font-size: 20px;
      line-height: 1.9;
      color: var(--ink-2);
      margin-bottom: 1.2em;
    }

    @media (max-width: 600px) {
      .wc-2col { grid-template-columns: 1fr; }
      .wc-img-wide { aspect-ratio: 16/9; }
    }

    /* ── Next project ── */
    .work-next {
      display: block;
      text-decoration: none;
      color: #fff;
      position: relative;
      height: clamp(320px, 50vh, 600px);
      overflow: hidden;
    }
    .wn-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform .6s var(--ease);
    }
    .work-next:hover .wn-bg { transform: scale(1.04); }
    .wn-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.78) 0%, rgba(0,0,0,.42) 50%, rgba(0,0,0,.52) 100%);
    }
    .wn-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: clamp(24px,4vh,48px) clamp(24px,4vw,64px);
    }
    .wn-label {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 14px rgba(0,0,0,.35);
    }
    .wn-title {
      font-family: var(--font-d);
      font-size: clamp(28px, 5vw, 72px);
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1.05;
      color: #fff;
      text-align: center;
      text-shadow: 0 3px 22px rgba(0,0,0,.4);
    }

    /* ── Scroll reveal for dynamic content ── */
    .wr { opacity: 0; transform: translateY(32px); transition: opacity 1s cubic-bezier(0,0,.2,1), transform 1s cubic-bezier(0,0,.2,1); }
    .wr.v { opacity: 1; transform: none; }
    .wr.d1 { transition-delay: .12s; }
    .wr.d2 { transition-delay: .24s; }
    .wr.d3 { transition-delay: .36s; }
    .wr.d4 { transition-delay: .48s; }
    .wr.d5 { transition-delay: .60s; }
    .wr.d6 { transition-delay: .72s; }

    /* ── Hero (사진·영상·링크 단일 슬롯) ── */

    @media (max-width: 768px) {
      .work-body { grid-template-columns: 1fr; gap: 40px; }
      .work-gallery { grid-template-columns: 1fr; }
      .wg-item:first-child { grid-column: span 1; aspect-ratio: 16/10; }
    }
  </style>
</head>

  <script>
  // ── Project data ──────────────────────────────────────────
  const PROJECTS = [

      type: 'Interactive LED Installation',

      desc: '관람객의 움직임을 실시간으로 감지하여 공간 전체를 빛의 파동으로 변환하는 인터랙티브 설치 작품입니다. OpenCV 기반의 모션 트래킹 시스템이 관람객의 위치와 속도를 분석하고, 이를 수백 개의 LED 모듈에 반영하여 인간과 빛의 즉흥적인 대화를 만들어냅니다.\n\n빛은 단순한 조명이 아닌 언어가 됩니다. 관람객이 멈추면 빛도 멈추고, 달리면 빛도 달립니다. 이 작품은 예술과 기술이 만나는 순간을 공간 속에서 체험하게 합니다.',
      client: '서울 미디어아트 페스티벌',
      duration: '3개월',
      role: '기획 · 개발 · 설치',

      id: '02',
      ko: '공간 매핑',
      en: 'Spatial Mapping',
      year: '2024',
      type: 'Architectural Projection Mapping',
      cats: 'Projection · LiDAR · TouchDesigner',
      desc: '건물의 건축적 구조를 LiDAR 스캔으로 정밀하게 분석하고, 그 위에 디지털 레이어를 투영하는 대규모 프로젝션 매핑 작업입니다. 현실의 물리적 공간과 디지털 이미지의 경계를 허물어 새로운 공간 경험을 제시합니다.\n\n건물은 스크린이 되고, 공간은 움직이기 시작합니다. 수십 대의 프로젝터가 정밀하게 정렬되어 하나의 거대한 캔버스를 만들어냅니다.',

    const m = (href || '').match(/id=(\w+)/);
    return m ? m[1].padStart(2, '0') : '';
  }
  function worksOrderedProjects() {
    const fallback = PROJECTS.slice();
    let orderedIds = [];
    try {
      const saved = JSON.parse(localStorage.getItem('arthod-cardorder:works'));
      if (Array.isArray(saved)) orderedIds = saved.map(idFromWorkHref).filter(Boolean);
    } catch (e) {}
    const ordered = orderedIds.map(projectById).filter(Boolean);
    const seen = new Set(ordered.map(project => project.id));
    fallback.forEach(project => {
      if (!seen.has(project.id)) ordered.push(project);
    });
    let count = ordered.length;
    try {
      const raw = parseInt(localStorage.getItem('arthod-workcount:works'), 10);
      if (Number.isFinite(raw)) count = Math.max(1, Math.min(ordered.length, raw));
    } catch (e) {}
    return ordered.slice(0, count);
  }

    <!-- Hero: 사진/영상/링크 (편집 모드에서 클릭해 교체) -->
    <div class="work-hero">
      <div class="wc-img" data-media="image" data-media-key="wd:${p.id}:c0" data-media-rich="1" style="position:absolute;inset:0;border-radius:0">
        <img src="${imgs[0]}" alt="${p.ko} 전경" style="width:100%;height:100%;object-fit:cover">
      </div>
    </div>

    <!-- Back + Title -->
    <div class="work-intro wr" style="max-width:var(--max);margin:0 auto;padding:32px var(--px) 0">
      <a href="works.html?v=works-hover-slots-20260706-1" class="back-link">Works</a>
      <div class="work-hero-title">
        <span class="wht-ko">${p.ko}</span>
        <span class="wht-en">${p.en}</span>
      </div>
    </div>

    <!-- Meta bar -->
    <div class="work-meta-bar wr d1">
      <div class="wm-item">
        <span class="wm-label">Year</span>
        <span class="wm-val">${p.year}</span>
      </div>
      <div class="wm-item">
        <span class="wm-label">Project</span>
        <span class="wm-val">${p.client}</span>
      </div>
      <div class="wm-item">
        <span class="wm-label">Client</span>
        <span class="wm-val" data-ek="clientorg">${p.clientOrg || '클라이언트명을 입력하세요'}</span>
      </div>
      <div class="wm-item">
        <span class="wm-label">Location</span>
        <span class="wm-val" data-ek="location">${p.location || '장소 미입력'}</span>
      </div>
    </div>

    <!-- Body -->
    <div class="work-body wr d2">
      <div>
        <p class="wb-section-label">Project Overview</p>
        <div class="wb-desc" data-ek="desc">${descHtml}</div>
      </div>
      <div class="work-specs">
        <p class="wb-section-label">Details</p>
        <div class="spec-row">
          <span class="spec-key">Role</span>
          <span class="spec-val" data-ek="role">${p.role}</span>
        </div>
        <div class="spec-row">
          <span class="spec-key">Duration</span>
          <span class="spec-val" data-ek="duration">${p.duration}</span>
        </div>
        <div class="spec-row">
          <span class="spec-key">Running Time</span>
          <span class="spec-val" data-ek="runtime">${p.runtime || '작품 구동 시간을 입력하세요'}</span>
        </div>
        <div class="spec-row">
          <span class="spec-key">Tech Stack</span>
          <span class="spec-val" data-ek="tech">${p.tech}</span>
        </div>
      </div>
    </div>

    <!-- Content blocks -->
    <div class="work-content">


      <div class="wc-layout-btn" type="button">⊞ 갤러리 레이아웃</div>
      <div class="wc-gallery" data-layout="grid-3x2" id="wc-gallery-root"></div>
      <button class="wc-gallery-add" type="button">+ 사진 추가</button>

    </div>

    <!-- Next project -->
    <a class="work-next wr" href="work.html?id=${next.id}&v=detail-next-order-20260706-1" data-media="image" data-media-key="wd:${p.id}:next">
      <div class="wn-bg" style="background-image:url('${nextImg}')"></div>
      <div class="wn-overlay"></div>
      <div class="wn-content">
        <span class="wn-label">Next Project</span>
        <div class="wn-title">${next.ko}</div>
      </div>
    </a>
  `;
  // Scroll reveal for dynamically rendered elements
  (function () {
    const wrEls = document.querySelectorAll('.wr');
    function settle(el) {
      el.classList.add('v');
    }
    // 안전장치: IntersectionObserver 미지원/실패 시 즉시 전부 표시
    if (!('IntersectionObserver' in window)) {
      wrEls.forEach(settle);
      return;
    }
    try {
      const wrObs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { settle(e.target); wrObs.unobserve(e.target); }
        });
      }, { threshold: 0.05, rootMargin: '0px 0px -32px 0px' });
      wrEls.forEach(el => wrObs.observe(el));
    } catch (err) {
      wrEls.forEach(settle);
    }
  })();

  // ── 갤러리 사진 목록 (추가/삭제 가능) ────────────────────────
  const GALLERY_ITEMS_KEY = 'arthod-galleryitems:' + p.id;
  const DEFAULT_GALLERY_SLOTS = ['g1', 'g2', 'g3', 'g4', 'g5', 'g6'];
  let galleryRevealObserver = null;
  let galleryRevealRaf = null;

  function setupGalleryReveal() {
    const items = [...document.querySelectorAll('#wc-gallery-root .wc-gitem')];
    items.forEach((item, i) => {
      item.style.setProperty('--g-delay', Math.min((i % 3) * 0.08, 0.16).toFixed(2) + 's');
    });

    if (!('IntersectionObserver' in window)) {
      items.forEach(item => item.classList.add('v'));
      return;
    }

    if (galleryRevealObserver) galleryRevealObserver.disconnect();
    if (galleryRevealRaf) cancelAnimationFrame(galleryRevealRaf);
    galleryRevealObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        revealGalleryByScroll(items);
      });
    }, { threshold: 0.18, rootMargin: '0px 0px -22% 0px' });

    items.forEach(item => galleryRevealObserver.observe(item));
    window.addEventListener('scroll', () => {
      if (galleryRevealRaf) return;
      galleryRevealRaf = requestAnimationFrame(() => {
        galleryRevealRaf = null;
        revealGalleryByScroll(items);
      });
    }, { passive: true });
    revealGalleryByScroll(items);
  }

  function revealGalleryByScroll(items) {
    const vh = window.innerHeight || document.documentElement.clientHeight || 1;
    const root = document.getElementById('wc-gallery-root');
    const cols = root ? Math.max(1, getComputedStyle(root).gridTemplateColumns.split(' ').filter(Boolean).length) : 3;
    items.forEach((item, i) => {
      if (item.classList.contains('v')) return;
      const rect = item.getBoundingClientRect();
      const col = i % cols;
      const row = Math.floor(i / cols);
      const trigger = vh * (0.82 - col * 0.08 - row * 0.03);
      if (rect.top < trigger) {
        item.classList.add('v');
        if (galleryRevealObserver) galleryRevealObserver.unobserve(item);
      }
    });
  }

  function defaultImgFor(slot) {
    const n = parseInt(slot.replace('g', ''), 10);
    return imgs[(2 + n) % imgs.length] || imgs[3];
  }
  function loadGallerySlots() {
    try {
      const saved = JSON.parse(localStorage.getItem(GALLERY_ITEMS_KEY));
      if (Array.isArray(saved) && saved.length) return saved;
    } catch (e) {}
    return DEFAULT_GALLERY_SLOTS.slice();
  }
  let gallerySlots = loadGallerySlots();
  function saveGallerySlots() { localStorage.setItem(GALLERY_ITEMS_KEY, JSON.stringify(gallerySlots)); }
  function applySavedGalleryLayout() {
    const savedLayout = localStorage.getItem(GALLERY_LAYOUT_KEY);
    if (savedLayout && GALLERY_LAYOUTS.some(l => l.id === savedLayout)) {
      galleryEl.setAttribute('data-layout', savedLayout);
    }
  }
  function renderGallery() {
    const root = document.getElementById('wc-gallery-root');
    root.innerHTML = gallerySlots.map(slot =>
      `<div class="wc-gitem" data-slot="${slot}">`
      + `<div class="wc-img" data-media="image" data-media-key="wd:${p.id}:${slot}" data-media-rich="1"><img src="${defaultImgFor(slot)}" alt=""></div>`
      + `<button class="wc-gitem-remove" type="button" title="사진 삭제">✕</button>`
      + `</div>`
    ).join('');
    root.querySelectorAll('.wc-gitem-remove').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const item = btn.closest('.wc-gitem');
        const slot = item.dataset.slot;
        if (!confirm('이 사진을 갤러리에서 삭제할까요?')) return;
        gallerySlots = gallerySlots.filter(s => s !== slot);
        saveGallerySlots();
        renderGallery();
        if (window.ArthodEditor) window.ArthodEditor.reapplyMedia();
      });
    });
    setupGalleryReveal();
    if (window.ArthodEditor) window.ArthodEditor.reapplyMedia();
  }
  document.querySelector('.wc-gallery-add').addEventListener('click', () => {
    let n = 1;
    const used = new Set(gallerySlots);
    while (used.has('g' + n)) n++;
    gallerySlots.push('g' + n);
    saveGallerySlots();
    renderGallery();
  });

  // ── 갤러리 레이아웃 선택 ────────────────────────────────────
  const GALLERY_LAYOUT_KEY = 'arthod-gallerylayout:' + p.id;
  const GALLERY_LAYOUTS = [
    { id: 'grid-3x2', label: '균등 그리드 (3×2)' },
    { id: 'grid-2x3', label: '세로형 그리드 (2열)' },
    { id: 'wide-strip', label: '와이드 스트립 (2열)' },
    { id: 'feature-mix', label: '대표 사진 강조형' },
  ];
  const galleryEl = document.querySelector('.wc-gallery');
  applySavedGalleryLayout();
  renderGallery();
  function refreshGalleryFromStorage() {
    gallerySlots = loadGallerySlots();
    applySavedGalleryLayout();
    renderGallery();
  }
  window.ArthodWorkDetail = { refreshGallery: refreshGalleryFromStorage };
  window.addEventListener('arthod:public-sync', refreshGalleryFromStorage);
  let layoutPanel;
  function buildLayoutPanel() {
    layoutPanel = document.createElement('div');
    layoutPanel.className = 'wc-layout-panel';
    layoutPanel.innerHTML =
      '<div class="wlp-head"><span>갤러리 레이아웃</span><button class="wlp-close" type="button">✕</button></div>'
      + '<div class="wlp-list"></div>';
    document.body.appendChild(layoutPanel);
    layoutPanel.querySelector('.wlp-close').addEventListener('click', () => layoutPanel.classList.remove('open'));
  }
  function renderLayoutPanel() {
    if (!layoutPanel) buildLayoutPanel();
    const list = layoutPanel.querySelector('.wlp-list');
    list.innerHTML = '';
    const current = galleryEl.getAttribute('data-layout');
    GALLERY_LAYOUTS.forEach(l => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'wlp-opt' + (l.id === current ? ' active' : '');
      btn.innerHTML = '<span class="wlp-opt-icon">' + iconForLayout(l.id) + '</span><span class="wlp-opt-label">' + l.label + '</span>';
      btn.addEventListener('click', () => {
        galleryEl.setAttribute('data-layout', l.id);
        localStorage.setItem(GALLERY_LAYOUT_KEY, l.id);
        renderLayoutPanel();
        if (window.ArthodEditor) window.ArthodEditor.reapplyMedia();
      });
      list.appendChild(btn);
    });
    layoutPanel.classList.add('open');
  }
  function iconForLayout(id) {
    if (id === 'grid-3x2') return '<span style="grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;display:grid;width:100%;height:100%"><span></span><span></span><span></span><span></span><span></span><span></span></span>';
    if (id === 'grid-2x3') return '<span style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;display:grid;width:100%;height:100%"><span></span><span></span><span></span><span></span><span></span><span></span></span>';
    if (id === 'wide-strip') return '<span style="grid-template-columns:1fr 1fr;grid-template-rows:1fr;display:grid;width:100%;height:100%"><span></span><span></span></span>';
    return '<span style="grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;display:grid;width:100%;height:100%"><span style="grid-column:span 2;grid-row:span 2"></span><span></span><span></span></span>';
  }
  document.querySelector('.wc-layout-btn').addEventListener('click', renderLayoutPanel);
  if (window.ArthodEditor) window.ArthodEditor.reapplyMedia();
  </script>
</body>
</html>
